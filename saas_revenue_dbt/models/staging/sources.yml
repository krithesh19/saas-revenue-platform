version: 2

sources:
  - name: raw
    database: SAAS_REVENUE_DB
    schema: RAW
    description: "Raw data loaded from Azure Blob Storage via Python ETL"
    
    tables:
      - name: customers
        description: "Raw customer data — 500 SaaS companies"
        columns:
          - name: CUSTOMER_ID
            description: "Unique customer identifier"
            tests:
              - unique
              - not_null
          - name: COMPANY_NAME
            tests:
              - not_null
          - name: SEGMENT
            tests:
              - not_null
              - accepted_values:
                  values: ['SMB', 'Mid-Market', 'Enterprise']

      - name: subscriptions
        description: "Raw subscription data"
        columns:
          - name: SUBSCRIPTION_ID
            tests:
              - unique
              - not_null
          - name: CUSTOMER_ID
            tests:
              - not_null
          - name: STATUS
            tests:
              - accepted_values:
                  values: ['Active', 'Churned']
          - name: MRR
            tests:
              - not_null

      - name: invoices
        description: "Raw monthly invoice records"
        columns:
          - name: INVOICE_ID
            tests:
              - unique
              - not_null
          - name: CUSTOMER_ID
            tests:
              - not_null
          - name: AMOUNT_DUE
            tests:
              - not_null